# Firebase App Hosting configuration
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0

env:
  # ForMeta backend services (public URLs, no son secretos)
  - variable: FISCAL_API_BASE_URL
    value: https://fiscal.formeta.es
    availability:
      - RUNTIME

  - variable: RAG_API_BASE_URL
    value: https://frag.formeta.es
    availability:
      - RUNTIME

  # Firebase Admin SDK (alta/gestión de usuarios desde Equipo).
  # En App Hosting suele bastar con las Application Default Credentials del
  # backend (la service account del runtime con rol "Firebase Authentication
  # Admin"). Si la creación de usuarios falla por permisos, crea el secreto
  # con la clave JSON de una service account y descomenta:
  #   firebase apphosting:secrets:set FIREBASE_SERVICE_ACCOUNT_JSON --project fmeta-f9aed
  # - variable: FIREBASE_SERVICE_ACCOUNT_JSON
  #   secret: FIREBASE_SERVICE_ACCOUNT_JSON
  #   availability:
  #     - RUNTIME

  # Google Drive (módulo de archivos por proyecto).
  - variable: GOOGLE_DRIVE_ROOT_ID
    value: "0AFKiFD2uNb84Uk9PVA"
    availability:
      - RUNTIME
  - variable: GOOGLE_DRIVE_PLAN_LIMIT_TB
    value: "2"
    availability:
      - RUNTIME
  # Clave del SA miembro de la Unidad compartida (secreto en Secret Manager).
  - variable: GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON
    secret: GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON
    availability:
      - RUNTIME

  # Cloudflare Access service token (opcional):
  # Solo necesario si se reactiva Cloudflare Access / Under Attack Mode
  # en fiscal.formeta.es o frag.formeta.es. Para activarlo, crea los
  # secretos en Secret Manager y descomenta:
  #   firebase apphosting:secrets:set CF_ACCESS_CLIENT_ID --project fmeta-f9aed
  #   firebase apphosting:secrets:set CF_ACCESS_CLIENT_SECRET --project fmeta-f9aed
  # - variable: CF_ACCESS_CLIENT_ID
  #   secret: CF_ACCESS_CLIENT_ID
  #   availability:
  #     - RUNTIME
  # - variable: CF_ACCESS_CLIENT_SECRET
  #   secret: CF_ACCESS_CLIENT_SECRET
  #   availability:
  #     - RUNTIME
